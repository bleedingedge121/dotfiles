general {
    col.active_border = rgba(ac888777)
    col.inactive_border = rgba(5c3f3f55)
}

misc {
    background_color = rgba(1f0f0fFF)
}

plugin {
    hyprbars {
        # Honestly idk if it works like css, but well, why not
        bar_text_font = Google Sans Flex Medium, Rubik, Geist, AR One Sans, Reddit Sans, Inter, Roboto, Ubuntu, Noto Sans, sans-serif
        bar_height = 30
        bar_padding = 10
        bar_button_padding = 5
        bar_precedence_over_border = true
        bar_part_of_window = true

        bar_color = rgba(1f0f0fFF)
        col.text = rgba(fbdbdaFF)


        # example buttons (R -> L)
        # hyprbars-button = color, size, on-click
        hyprbars-button = rgb(fbdbda), 13, 󰖭, hyprctl dispatch killactive
        hyprbars-button = rgb(fbdbda), 13, 󰖯, hyprctl dispatch fullscreen 1
        hyprbars-button = rgb(fbdbda), 13, 󰖰, hyprctl dispatch movetoworkspacesilent special
    }
}

windowrule = border_color rgba(ffb3b2AA) rgba(ffb3b277), match:pin 1
